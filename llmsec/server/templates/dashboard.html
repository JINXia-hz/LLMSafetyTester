<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLMSEC 安全评估面板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .card { @apply bg-white rounded-lg shadow p-4; }
    .metric-value { @apply text-3xl font-bold text-slate-800; }
    .metric-label { @apply text-sm text-slate-500; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-4">
    <header class="mb-6">
      <h1 class="text-2xl font-bold text-slate-900">🔒 LLMSEC 安全评估面板</h1>
      <p class="text-slate-600 text-sm mt-1">只读可视化 · 可扩展为操作面板</p>
    </header>

    <div class="card mb-4 flex items-center gap-4">
      <label class="font-medium text-slate-700">评估结果:</label>
      <select id="resultSelect" class="border border-slate-300 rounded px-3 py-2 text-sm min-w-[280px]">
        <option value="">请选择...</option>
      </select>
      <button id="refreshBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm">刷新</button>
      <span id="status" class="text-sm text-slate-500"></span>
    </div>

    <div id="loading" class="hidden text-center py-12 text-slate-500">加载中...</div>

    <main id="dashboard" class="hidden">
      <!-- 总览 -->
      <section class="mb-6">
        <h2 class="text-lg font-semibold text-slate-800 mb-3">📊 总体概览</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
          <div class="card"><div class="metric-label">总运行</div><div id="m_total" class="metric-value">-</div></div>
          <div class="card"><div class="metric-label">有害产出 (ASR)</div><div id="m_asr" class="metric-value">-</div></div>
          <div class="card"><div class="metric-label">拒绝数</div><div id="m_refusal" class="metric-value">-</div></div>
          <div class="card"><div class="metric-label">平均延迟</div><div id="m_latency" class="metric-value">-</div></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="card"><div class="metric-label">ELO 安全边界</div><div id="m_boundary" class="metric-value">-</div></div>
          <div class="card"><div class="metric-label">边界置信度</div><div id="m_confidence" class="metric-value">-</div></div>
          <div class="card"><div class="metric-label">误杀率 FPR</div><div id="m_fpr" class="metric-value">-</div></div>
        </div>
      </section>

      <!-- 图表 -->
      <section class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <div class="card"><h3 class="font-semibold mb-2 text-slate-700">按有害类别 ASR</h3><div id="chart_harm"></div></div>
        <div class="card"><h3 class="font-semibold mb-2 text-slate-700">按混淆方式 ASR</h3><div id="chart_obs"></div></div>
      </section>

      <section class="mb-6">
        <h2 class="text-lg font-semibold text-slate-800 mb-3">🗡️ 攻击方法排名</h2>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-4">
          <div class="card"><h3 class="font-semibold mb-2 text-slate-700">成功率 TOP 15</h3><div id="chart_methods_top"></div></div>
          <div class="card"><h3 class="font-semibold mb-2 text-slate-700">成功率 BOTTOM 15</h3><div id="chart_methods_bottom"></div></div>
        </div>
        <div class="card"><h3 class="font-semibold mb-2 text-slate-700">ELO vs ASR</h3><div id="chart_elo_asr"></div></div>
      </section>

      <section class="mb-6">
        <h2 class="text-lg font-semibold text-slate-800 mb-3">🎯 Behavior 级成功率</h2>
        <div class="card"><div id="chart_behaviors"></div></div>
      </section>

      <section class="mb-6">
        <h2 class="text-lg font-semibold text-slate-800 mb-3">🧬 聚类结果</h2>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-4">
          <div class="card"><h3 class="font-semibold mb-2 text-slate-700">簇大小分布</h3><div id="chart_clusters"></div></div>
          <div class="card">
            <h3 class="font-semibold mb-2 text-slate-700">验证指标</h3>
            <div class="space-y-2 text-sm text-slate-700">
              <div>方法数: <span id="c_method_count">-</span></div>
              <div>簇数: <span id="c_n_clusters">-</span></div>
              <div>轮廓系数: <span id="c_silhouette">-</span></div>
              <div>Davies-Bouldin: <span id="c_db">-</span></div>
            </div>
          </div>
        </div>
        <div id="clusterList" class="space-y-2"></div>
      </section>

      <section class="mb-6">
        <h2 class="text-lg font-semibold text-slate-800 mb-3">🎖️ ELO 全局排名 TOP 20</h2>
        <div class="card overflow-auto"><table class="min-w-full text-sm text-left">
          <thead class="bg-slate-50 text-slate-600 font-medium">
            <tr><th class="px-4 py-2">方法</th><th class="px-4 py-2">ELO</th></tr>
          </thead>
          <tbody id="eloTable" class="divide-y divide-slate-100"></tbody>
        </table></div>
      </section>
    </main>
  </div>

  <script>
    const fmtPct = v => (v * 100).toFixed(2) + '%';

    async function loadResults() {
      const res = await fetch('/api/results');
      const data = await res.json();
      const sel = document.getElementById('resultSelect');
      sel.innerHTML = '<option value="">请选择...</option>';
      data.results.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        sel.appendChild(opt);
      });
      if (data.results.length > 0) {
        sel.value = data.results[0];
        await loadDashboard(data.results[0]);
      }
    }

    async function loadDashboard(result) {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('status').textContent = '加载 ' + result;

      try {
        const [summary, methods, behaviors, clusters, elo] = await Promise.all([
          fetch('/api/summary?result=' + encodeURIComponent(result)).then(r => r.json()),
          fetch('/api/methods?result=' + encodeURIComponent(result)).then(r => r.json()),
          fetch('/api/behaviors?result=' + encodeURIComponent(result)).then(r => r.json()),
          fetch('/api/clusters').then(r => r.json()),
          fetch('/api/elo').then(r => r.json()),
        ]);

        renderOverview(summary);
        renderHarmChart(summary.harm_type_asr);
        renderObsChart(summary.obfuscation_asr);
        renderMethods(methods.methods);
        renderBehaviors(behaviors.behaviors);
        renderClusters(clusters);
        renderElo(elo.ranking);

        document.getElementById('dashboard').classList.remove('hidden');
      } catch (e) {
        document.getElementById('status').textContent = '加载失败: ' + e.message;
      } finally {
        document.getElementById('loading').classList.add('hidden');
      }
    }

    function renderOverview(s) {
      document.getElementById('m_total').textContent = s.total;
      document.getElementById('m_asr').textContent = s.harmful + ' (' + fmtPct(s.asr) + ')';
      document.getElementById('m_refusal').textContent = s.refusal;
      document.getElementById('m_latency').textContent = Math.round(s.latency_mean_ms) + ' ms';
      document.getElementById('m_boundary').textContent = s.boundary_elo != null ? s.boundary_elo.toFixed(1) : 'N/A';
      document.getElementById('m_confidence').textContent = s.boundary_confidence != null ? (s.boundary_confidence * 100).toFixed(0) + '%' : 'N/A';
      document.getElementById('m_fpr').textContent = fmtPct(s.fpr);
    }

    function renderHarmChart(data) {
      const items = Object.entries(data).map(([k, v]) => ({ category: k, asr: v }));
      Plotly.newPlot('chart_harm', [{
        x: items.map(i => i.category),
        y: items.map(i => i.asr),
        type: 'bar',
        text: items.map(i => fmtPct(i.asr)),
        textposition: 'auto',
        marker: { color: '#3b82f6' }
      }], { yaxis: { tickformat: '.0%', range: [0, 1] }, margin: { t: 10 } }, {responsive: true});
    }

    function renderObsChart(data) {
      const items = Object.entries(data).map(([k, v]) => ({ obfuscation: k, asr: v }));
      Plotly.newPlot('chart_obs', [{
        x: items.map(i => i.obfuscation),
        y: items.map(i => i.asr),
        type: 'bar',
        text: items.map(i => fmtPct(i.asr)),
        textposition: 'auto',
        marker: { color: '#10b981' }
      }], { yaxis: { tickformat: '.0%', range: [0, 1] }, margin: { t: 10 } }, {responsive: true});
    }

    function renderMethods(methods) {
      const top = methods.slice(0, 15);
      const bottom = methods.slice(-15).reverse();

      Plotly.newPlot('chart_methods_top', [{
        y: top.map(m => m.method),
        x: top.map(m => m.asr),
        type: 'bar',
        orientation: 'h',
        text: top.map(m => fmtPct(m.asr)),
        textposition: 'auto',
        marker: { color: '#ef4444' }
      }], { xaxis: { tickformat: '.0%', range: [0, 1] }, margin: { t: 10 }, height: 420 }, {responsive: true});

      Plotly.newPlot('chart_methods_bottom', [{
        y: bottom.map(m => m.method),
        x: bottom.map(m => m.asr),
        type: 'bar',
        orientation: 'h',
        text: bottom.map(m => fmtPct(m.asr)),
        textposition: 'auto',
        marker: { color: '#64748b' }
      }], { xaxis: { tickformat: '.0%', range: [0, 1] }, margin: { t: 10 }, height: 420 }, {responsive: true});

      Plotly.newPlot('chart_elo_asr', [{
        x: methods.map(m => m.elo),
        y: methods.map(m => m.asr),
        mode: 'markers',
        type: 'scatter',
        text: methods.map(m => m.method),
        marker: { size: 10, color: methods.map(m => m.asr), colorscale: 'RdYlGn', showscale: true }
      }], { xaxis: { title: 'ELO' }, yaxis: { title: 'ASR', tickformat: '.0%' }, margin: { t: 10 } }, {responsive: true});
    }

    function renderBehaviors(behaviors) {
      const top = behaviors.slice(0, 25);
      Plotly.newPlot('chart_behaviors', [{
        y: top.map(b => b.behavior),
        x: top.map(b => b.asr),
        type: 'bar',
        orientation: 'h',
        text: top.map(b => fmtPct(b.asr)),
        textposition: 'auto',
        marker: { color: top.map(b => b.any_success ? '#f59e0b' : '#94a3b8') }
      }], { xaxis: { tickformat: '.0%', range: [0, 1] }, margin: { t: 10 }, height: 600 }, {responsive: true});
    }

    function renderClusters(data) {
      document.getElementById('c_method_count').textContent = data.method_count;
      document.getElementById('c_n_clusters').textContent = data.n_clusters;
      document.getElementById('c_silhouette').textContent = (data.validation.silhouette || 0).toFixed(4);
      document.getElementById('c_db').textContent = (data.validation.davies_bouldin || 0).toFixed(4);

      Plotly.newPlot('chart_clusters', [{
        labels: data.clusters.map(c => c.name),
        values: data.clusters.map(c => c.size),
        type: 'pie',
        textinfo: 'label+value',
        hole: 0.4
      }], { margin: { t: 10 }, showlegend: false }, {responsive: true});

      const list = document.getElementById('clusterList');
      list.innerHTML = '';
      data.clusters.forEach(c => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<div class="font-medium text-slate-800">簇 ${c.id}: ${c.name} <span class="text-slate-500 text-sm">(${c.size} 种方法)</span></div>
          <div class="text-xs text-slate-500 mt-1 truncate">${c.members.slice(0, 20).join(', ')}${c.members.length > 20 ? '...' : ''}</div>`;
        list.appendChild(div);
      });
    }

    function renderElo(ranking) {
      const tbody = document.getElementById('eloTable');
      tbody.innerHTML = '';
      ranking.slice(0, 20).forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="px-4 py-2 font-mono text-slate-700">${row.method}</td><td class="px-4 py-2 font-semibold">${row.elo.toFixed(1)}</td>`;
        tbody.appendChild(tr);
      });
    }

    document.getElementById('resultSelect').addEventListener('change', e => {
      if (e.target.value) loadDashboard(e.target.value);
    });
    document.getElementById('refreshBtn').addEventListener('click', loadResults);

    loadResults();
  </script>
</body>
</html>
